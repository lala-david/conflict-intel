name: Daily Conflict Intelligence

# 무료 클라우드 자동화 (일일 분쟁·안보 인텔 수집).
#   - 매일 09:00 KST(00:00 UTC) 자동 수집
#   - DB(276MB, gitignore)는 GitHub Actions 캐시로 영속화(레포 비공개, 공개 다운로드 불가): 복원 → 저장
#   - 수집/통계 후 변경분을 Turso(클라우드 SQLite)에 동기화 → Cloudflare Pages 사이트가 읽음
#   - 리포트(.md)는 평소처럼 repo 에 커밋
#
# 필요한 repo Secrets:
#   OPENAI_API_KEY, UCDP_TOKEN            — 수집/BLUF
#   TURSO_DATABASE_URL, TURSO_AUTH_TOKEN  — 사이트 Turso 동기화 (hrana HTTP, CLI 불필요)
# 풀 DB는 db-latest 릴리스에 보관 → 캐시 미스 시 시드 (통계 정확성 보장).
on:
  schedule:
    - cron: "0 0 * * *"      # 매일 00:00 UTC = 09:00 KST
  workflow_dispatch:

concurrency:
  group: daily-terror
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt

      # ─── DB 영속화: 이전 conflict.db 를 Actions 캐시(비공개)에서 복원 (없으면 새로 시작) ───
      #     conflict-db-* 우선, 없으면 legacy terror-db-* 도 복원 (이름 변경 마이그레이션).
      - name: Restore DB (private cache)
        uses: actions/cache/restore@v4
        with:
          path: |
            data/conflict.db
            data/terror.db
          key: conflict-db-${{ github.run_id }}
          restore-keys: |
            conflict-db-
            terror-db-

      - name: Migrate legacy DB filename (terror.db → conflict.db)
        run: |
          if [ -f data/terror.db ] && [ ! -f data/conflict.db ]; then
            mv data/terror.db data/conflict.db
            echo "migrated legacy terror.db → conflict.db"
          fi

      # ─── 캐시가 없으면 db-latest 릴리스에서 풀 DB(419K)를 시드 → 통계가 정확해짐 ───
      - name: Seed full DB from db-latest (on cache miss)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f data/conflict.db ]; then
            echo "cache miss — seeding full DB from db-latest release"
            gh release download db-latest --pattern conflict.db --dir data --clobber || echo "no db-latest asset"
          fi
          [ -f data/conflict.db ] && echo "DB ready: $(du -h data/conflict.db | cut -f1)"

      - name: Run medallion pipeline (bronze → silver → gold)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UCDP_TOKEN: ${{ secrets.UCDP_TOKEN }}
        run: python scripts/pipeline/run.py

      - name: Weekly summary (Sundays only)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UCDP_TOKEN: ${{ secrets.UCDP_TOKEN }}
        run: |
          if [ "$(date +%u)" = "7" ]; then
            python scripts/weekly_summary.py
          fi

      - name: Compute dashboard stats
        run: python scripts/compute_stats.py

      # ─── 사이트가 읽는 Turso 에 동기화 (events append + stats/crypto 교체, 안전가드 내장) ───
      - name: Sync to Turso
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python scripts/sync_to_turso.py

      # ─── 갱신된 conflict.db 를 Actions 캐시 + db-latest 릴리스에 저장 (다음 실행이 이어받음) ───
      - name: Save DB (private cache)
        uses: actions/cache/save@v4
        with:
          path: data/conflict.db
          key: conflict-db-${{ github.run_id }}

      - name: Refresh db-latest release
        if: ${{ hashFiles('data/conflict.db') != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload db-latest data/conflict.db --clobber

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ data/classifications.json data/conflict_zones.json data/countries.json data/organizations.json data/.sanctions_cache.json data/known_ucdp_ids.json
          git diff --staged --quiet || (git commit -m "intel: $(date +%Y-%m-%d) daily brief" && git push)

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily conflict brief failed — ${new Date().toISOString().split('T')[0]}`,
              body: `Workflow run failed: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'automated']
            })
