name: Daily Terror Intelligence

# 무료 클라우드 자동화 (로컬 Windows 예약작업 대체).
#   - 매일 09:00 KST(00:00 UTC) 자동 수집
#   - DB(276MB, gitignore)는 GitHub Actions 캐시로 영속화(레포 비공개, 공개 다운로드 불가): 복원 → 저장
#   - 수집/통계 후 변경분을 Turso(클라우드 SQLite)에 동기화 → Cloudflare Pages 사이트가 읽음
#   - 리포트(.md)는 평소처럼 repo 에 커밋
#
# 필요한 repo Secrets:
#   OPENAI_API_KEY, UCDP_TOKEN            — 수집/BLUF
#   TURSO_DATABASE_URL                    — 예: libsql://terror-xxxx.turso.io
#   TURSO_API_TOKEN                       — turso CLI 인증 (turso auth api-tokens create)
# 필요한 repo Variables:
#   TURSO_DB_NAME                         — Turso DB 이름 (예: terror)
on:
  schedule:
    - cron: "0 0 * * *"      # 매일 00:00 UTC = 09:00 KST
  workflow_dispatch:

concurrency:
  group: daily-terror
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Install Turso CLI
        run: |
          curl -sSfL https://get.tur.so/install.sh | bash
          echo "$HOME/.turso" >> $GITHUB_PATH

      # ─── DB 영속화: 이전 conflict.db 를 Actions 캐시(비공개)에서 복원 (없으면 새로 시작) ───
      #     conflict-db-* 우선, 없으면 legacy terror-db-* 도 복원 (이름 변경 마이그레이션).
      - name: Restore DB (private cache)
        uses: actions/cache/restore@v4
        with:
          path: |
            data/conflict.db
            data/terror.db
          key: conflict-db-${{ github.run_id }}
          restore-keys: |
            conflict-db-
            terror-db-

      - name: Migrate legacy DB filename (terror.db → conflict.db)
        run: |
          if [ -f data/terror.db ] && [ ! -f data/conflict.db ]; then
            mv data/terror.db data/conflict.db
            echo "migrated legacy terror.db → conflict.db"
          fi

      - name: Run medallion pipeline (bronze → silver → gold)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UCDP_TOKEN: ${{ secrets.UCDP_TOKEN }}
        run: python scripts/pipeline/run.py

      - name: Weekly summary (Sundays only)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UCDP_TOKEN: ${{ secrets.UCDP_TOKEN }}
        run: |
          if [ "$(date +%u)" = "7" ]; then
            python scripts/weekly_summary.py
          fi

      - name: Compute dashboard stats
        run: python scripts/compute_stats.py

      # ─── 변경분을 Turso 에 동기화 (사이트가 읽는 DB) ───
      - name: Sync to Turso
        if: ${{ vars.TURSO_DB_NAME != '' }}
        env:
          TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
        run: |
          python scripts/export_for_turso.py > turso_sync.sql
          echo "Generated $(wc -l < turso_sync.sql) lines of sync SQL"
          turso db shell "${{ vars.TURSO_DB_NAME }}" < turso_sync.sql
          rm -f turso_sync.sql

      # ─── 갱신된 conflict.db 를 Actions 캐시(비공개)에 저장 (다음 실행이 이어받음) ───
      - name: Save DB (private cache)
        uses: actions/cache/save@v4
        with:
          path: data/conflict.db
          key: conflict-db-${{ github.run_id }}

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ data/classifications.json data/conflict_zones.json data/countries.json data/organizations.json data/.sanctions_cache.json data/known_ucdp_ids.json
          git diff --staged --quiet || (git commit -m "intel: $(date +%Y-%m-%d) daily brief" && git push)

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily terror brief failed — ${new Date().toISOString().split('T')[0]}`,
              body: `Workflow run failed: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'automated']
            })
