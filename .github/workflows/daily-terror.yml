name: Daily Terror Intelligence

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: daily-terror
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run daily terror intelligence
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UCDP_TOKEN: ${{ secrets.UCDP_TOKEN }}
        run: python scripts/daily_terror.py
      - name: Weekly summary (Sundays only)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UCDP_TOKEN: ${{ secrets.UCDP_TOKEN }}
        run: |
          if [ "$(date +%u)" = "7" ]; then
            python scripts/weekly_summary.py
          fi
      - name: Compute dashboard stats
        run: python scripts/compute_stats.py
      - name: Send ThreatPulse to Telegram
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_PHONE: ${{ secrets.TELEGRAM_PHONE }}
          THREAT_PULSE_CHANNEL: ${{ secrets.THREAT_PULSE_CHANNEL }}
        run: python scripts/threat_pulse.py || echo "ThreatPulse send failed (non-blocking)"
        continue-on-error: true
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ data/classifications.json data/conflict_zones.json data/countries.json data/organizations.json data/.sanctions_cache.json data/known_ucdp_ids.json
          git diff --staged --quiet || (git commit -m "intel: $(date +%Y-%m-%d) daily brief" && git push)
      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily terror brief failed — ${new Date().toISOString().split('T')[0]}`,
              body: `Workflow run failed: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'automated']
            })
